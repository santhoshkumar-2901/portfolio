  <body class="bg-bg dark:bg-bg-dark">
    <script>
      // Determine initial theme before React mounts, to avoid a flash of the wrong theme.
      // Priority: saved preference > system preference > dark fallback.
      (function () {
        try {
          var stored = window.localStorage.getItem("theme");
          var theme;
          if (stored === "dark" || stored === "light") {
            theme = stored;
          } else {
            var prefersLight =
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: light)").matches;
            theme = prefersLight ? "light" : "dark";
          }
          window.__initialTheme = theme;
          if (theme === "dark") document.documentElement.classList.add("dark");
        } catch (e) {
          window.__initialTheme = "dark";
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
